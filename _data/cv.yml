- title: Research Profile
  type: list
  contents:
    - Interdisciplinary researcher working across chemistry, automation engineering, and AI-enabled experimentation.
    - Leads a research team building autonomous robotic platforms for synthesis, analytics, and closed-loop decision making.
    - Develops quantitative frameworks for chemical complexity and prebiological selection, including assembly-theory-based metrics.

- title: Experience
  type: time_table
  contents:
    - title: Research Fellow
      institution: University of Glasgow, United Kingdom
      year: 2022 - present
      description:
        - Leading and managing a multidisciplinary team of 9 researchers and graduate students.
        - Developing experimental and theoretical frameworks to quantify directed chemical exploration in prebiological systems.
        - Co-developing autonomous chemistry platforms integrating robotics, low-field NMR, computer vision, and LLM-guided workflows.
        - Building hardware and software for laboratory automation, including CAD-based prototyping, microcontroller firmware, and Python orchestration.
        - Secured major research funding, including a $1.25M grant from the Alfred P. Sloan Foundation.

    - title: Postdoctoral Researcher
      institution: ETH Zurich, Switzerland
      year: 2021
      description:
        - Supervised MSc researchers and helped define project objectives and deliverables.
        - Synthesized modified amino acids and peptides, including supramolecular assemblies characterized by TEM.
        - Designed and characterized biocompatible porous peptide-based metal-organic frameworks.

    - title: Postdoctoral Researcher
      institution: University of Oxford, United Kingdom
      year: 2020
      description:
        - Developed original MATLAB software for predicting ring currents from experimental NMR data.
        - Parsed and interpreted literature NMR datasets to evaluate aromaticity in macrocyclic systems.
        - Combined DFT and NMR approaches to investigate electronic delocalization and ring-current behavior.

    - title: DPhil (PhD) Researcher
      institution: University of Oxford, United Kingdom
      year: 2016 - 2020
      description:
        - Investigated aromaticity and exciton delocalization in large porphyrin nanorings.
        - Designed and synthesized large porphyrin-based macrocycles, including Mobius-topology targets.
        - Analyzed ultrafast spectroscopy datasets (TRIR/2D-IR) and developed mechanism-driven analysis workflows.

    - title: MSc Research Student
      institution: University of Chemistry and Technology, Prague, Czech Republic
      year: 2015 - 2016
      description:
        - Studied visible-light [2+2] photocycloadditions promoted by organocatalysts.
        - Explored substrate scope and stereoselectivity for nitrogen-containing diene systems.

